schema_version: 1
policy_id: onecolleague-capability-allowlist-2026-05-07
snapshot_date: "2026-05-07"
description: >
  OneColleague capability allowlist. Default capability sources are deliberately
  limited to built-in CCCC capabilities and the OneColleague skill library.

level_semantics:
  indexed: "Synced in local catalog only; not shown in normal search results."
  mounted: "Visible/discoverable; can be enabled on demand. (formerly: enabled merged into mounted)"
  pinned: "Mounted + long-lived baseline intent; typically mapped into actor/profile autoload defaults."

defaults:
  source_level:
    cccc_builtin: mounted
    onecolleague_skill_library: mounted

  # Matches current CCCC implementation boundary.
  install_mode_allowlist:
    - remote_only
    - package:npm
    - package:pypi
    - package:oci

  # High-impact tags are informational only in runtime.
  # Enforcement is operational block/unblock via cccc_capability_block.
  risk_tags_high_impact:
    - computer_use
    - desktop_control
    - browser_automation
    - filesystem_write
    - terminal_exec
    - trading
    - payment_write

sources:
  - source_id: cccc_builtin
    enabled: true
    rationale: "Core CCCC packs and built-in skills; always available."
  - source_id: onecolleague_skill_library
    enabled: true
    rationale: "OneColleague skill library source served by done-hub agent-service."

skills:
  onecolleague: []

role_defaults:
  foreman:
    pinned: []
  peer:
    pinned: []
  auditor:
    pinned: []

operations:
  suggested_promotions:
    - "Promote a OneColleague skill only after import validation and a smoke test."
  suggested_demotions:
    - "Disable or block capabilities on repeated auth/install failures or unsafe behavior."
